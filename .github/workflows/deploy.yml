name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Dépendances
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Passer à '/' le jour du domaine custom (+ fichier CNAME)
          VITE_BASE: /SebMarasa/

      - name: Fallback SPA (routes profondes)
        run: cp dist/index.html dist/404.html

      - name: Configuration Pages
        uses: actions/configure-pages@v5

      - name: Artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
